<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字滚动效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f0f8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-container {
            display: flex;
            gap: 60px;
            padding: 60px 80px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 56px;
            font-weight: 800;
            color: #1a365d;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-suffix {
            font-size: 40px;
            font-weight: 700;
            color: #1a365d;
        }

        .stat-label {
            font-size: 14px;
            color: #4a5568;
            letter-spacing: 1px;
        }

        /* 响应式：窄屏改为纵向排列（转换时按目标框架响应式方案实现） */
        @media (max-width: 768px) {
            .stats-container {
                flex-direction: column;
                gap: 30px;
                padding: 30px 24px;
            }
        }

    </style>
</head>
<body>
    <div class="stats-container" id="statsContainer" data-component="number-scroll">
        <div class="stat-item" data-value="20" data-suffix="+" data-label="自主研发产品">
            <div class="stat-number"><span class="counter" data-target="20">0</span><span class="stat-suffix">+</span></div>
            <div class="stat-label">自主研发产品</div>
        </div>
        <div class="stat-item" data-value="3000" data-suffix="+" data-label="3D扫描成功案例">
            <div class="stat-number"><span class="counter" data-target="3000">0</span><span class="stat-suffix">+</span></div>
            <div class="stat-label">3D扫描成功案例</div>
        </div>
        <div class="stat-item" data-value="30" data-suffix="+" data-label="国际与国家级权威奖项">
            <div class="stat-number"><span class="counter" data-target="30">0</span><span class="stat-suffix">+</span></div>
            <div class="stat-label">国际与国家级权威奖项</div>
        </div>
        <div class="stat-item" data-value="20" data-suffix="%" data-label="销售收入投入研发">
            <div class="stat-number"><span class="counter" data-target="20">0</span><span class="stat-suffix">%</span></div>
            <div class="stat-label">销售收入投入研发</div>
        </div>
        <div class="stat-item" data-value="200" data-suffix="+" data-label="专利/软著">
            <div class="stat-number"><span class="counter" data-target="200">0</span><span class="stat-suffix">+</span></div>
            <div class="stat-label">专利/软著</div>
        </div>
        <div class="stat-item" data-value="68" data-suffix="%" data-label="发明专利占比">
            <div class="stat-number"><span class="counter" data-target="68">0</span><span class="stat-suffix">%</span></div>
            <div class="stat-label">发明专利占比</div>
        </div>
    </div>

    <script>
        // 数据契约映射（README schema ↔ 本文件）:
        //   value  → .stat-item[data-value] / .counter[data-target]
        //   suffix → .stat-item[data-suffix] / .stat-suffix 文本
        //   label  → .stat-item[data-label] / .stat-label 文本
        // 可调参数:
        //   duration → ANIMATION_DURATION
        //   className → .stats-container 的额外 class（转换时由 AI 注入）
        const ANIMATION_DURATION = 2000; // 可调：动画时长(ms)

        // 数字滚动动画
        function animateCounters() {
            const counters = document.querySelectorAll('.counter');

            // 尊重 prefers-reduced-motion：直接显示终值，不跑动画
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                if (reduceMotion) {
                    counter.textContent = target;
                    return;
                }
                const duration = ANIMATION_DURATION;
                const step = target / (duration / 16); // 每帧增加的值
                let current = 0;

                const updateCounter = () => {
                    current += step;
                    if (current < target) {
                        counter.textContent = Math.floor(current);
                        requestAnimationFrame(updateCounter);
                    } else {
                        counter.textContent = target;
                    }
                };

                updateCounter();
            });
        }

        // Intersection Observer 检测元素进入视口
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    animateCounters();
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        observer.observe(document.getElementById('statsContainer'));
    </script>
</body>
</html>
